id: crisis-logistics-env
name: Crisis Logistics Decision Environment
description: >
  A reinforcement learning environment simulating multi-product supply chain decisions
  under uncertainty, disruptions, and budget constraints.

api:
  base_url: ${API_BASE_URL}

endpoints:
  reset: /reset
  step: /step
  state: /state

action_space:
  type: object
  properties:
    product:
      type: string
      enum: ["A", "B", "C"]
    supplier_id:
      type: integer
    path_id:
      type: integer
    quantity:
      type: integer
      minimum: 0
      maximum: 100
    expedite:
      type: boolean
  required: ["product", "supplier_id", "path_id", "quantity", "expedite"]

observation_space:
  type: object
  properties:
    day:
      type: integer
    inventory:
      type: object
      properties:
        A:
          type: integer
        B:
          type: integer
        C:
          type: integer
    demand_forecast:
      type: number
    forecast_uncertainty:
      type: number
    incoming_shipments:
      type: array
    suppliers:
      type: array
    paths:
      type: object
    disruptions:
      type: array
    budget:
      type: number

reward:
  type: float
  range: [0.0, 1.0]
  description: >
    Reward is computed based on fulfillment ratio, cost efficiency,
    delay penalties, stockout penalties, and inventory balance.

tasks:
  - id: easy
    description: Single product, no disruptions, maintain stable inventory
    difficulty: easy

  - id: medium
    description: Multi-path logistics with disruptions and cost trade-offs
    difficulty: medium

  - id: hard
    description: Multi-product system with shared budget and conflicting demand
    difficulty: hard

evaluation:
  metric: average_reward
  goal: maximize